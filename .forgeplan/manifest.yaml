    spec: .forgeplan/specs/frontend-app-shell.md
    description: Next.js application shell. Left sidebar navigation, top bar global search, role-based route protection via Supabase Auth session, typed API client layer (generated from API contract), and all 10 operational screens with dense desktop-first UX. shadcn/ui + Tailwind. Drawers for quick edits. Component library includes StatusBadge, CaseTable, FacilityCard, ActivityTimeline, DraftEditor, FilterBar.
    acceptance_criteria:
      - Login screen authenticates via Supabase Auth; session stored; redirect to role default landing
      - Left sidebar shows role-appropriate navigation: Dashboard, Intake Workbench, Operations Queue, Facilities, Outreach, Analytics, Admin
      - Role-based redirect: intake_staff → Intake Workbench; clinical_reviewer → Operations Queue (clinical filter); placement_coordinator → Operations Queue (outreach filter); manager → Dashboard; admin → Admin Settings; read_only → Dashboard (read-only view)
      - Intake Workbench — daily census table with create/edit case forms, duplicate warning; drawer for quick edit
      - Spreadsheet Import screen — upload XLSX/CSV (multipart), map columns, validate, review per-row results, commit (commit button disabled until ImportJob.status=ready); if import fails, error summary shown with per-row detail and "Start New Import" action to restart the flow
      - Operations Queue — dense case table with status tab filters (all, intake, clinical, matching, outreach, response, declined-retry); aging flags visible; click-through to case detail; declined_retry_needed cases show "Route Retry" action with destination selector (→ matching or → outreach)
      - Patient Case Detail — 6-tab layout: Overview (summary cards), Clinical Review (assessment form), Facility Matches (ranked facility cards with scores and blockers), Outreach (draft list and editor), Timeline (activity feed), Audit (change log for admins)
      - Facility Match Results tab — Generate/Regenerate button; facility cards show name, type, distance, overall score, component scores, is_recommended badge, blocker chips, explanation text; "Select For Outreach" toggle per non-blocked facility (multiple selections allowed); after selecting, a contextual prompt appears "Ready to create outreach? Go to Outreach tab →" to guide coordinator; selected facilities highlighted in Outreach tab with facility name pre-filled in draft creation form
      - Outreach Draft editor — create draft from template (GET /api/v1/templates/outreach), edit subject/body, submit for approval, approve, mark sent, cancel; cancel also available for failed actions; outreach list shows all actions with status badges
      - Facility Directory — searchable, filterable by type/state/capability/payer; Facility Detail with tabs (Overview, Capabilities editor, Insurance rules, Contacts)
      - Outreach Dashboard — cross-case outreach queue filtered by approval_status
      - Analytics Dashboard — KPI cards (case volume, avg cycle time, placement rate), aging heatmap, decline reason chart; date range picker
      - Admin Settings — tabs: Users (invite/edit/deactivate), Templates (CRUD), Import Jobs (list with drill-down), Org Settings
      - All API calls use typed client; handle loading, error, and empty states
      - npm run dev starts Next.js dev server with no errors
