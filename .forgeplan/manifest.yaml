    spec: .forgeplan/specs/outreach-module.md
    description: Human-in-the-loop outreach workflow. Email drafts created from templates with safe allowlisted variable substitution (no user-supplied template logic). Human approval required before sending email. phone_manual and task channels need no approval. Email delivery stubbed in Phase 1. Template reads from admin-surfaces (no CRUD here). Outreach queue for coordinators.
    acceptance_criteria:
      - POST /api/v1/cases/{case_id}/outreach-actions creates OutreachAction(s) with approval_status=draft; template_id optional; variable substitution uses allowlisted safe variables only (patient_name, facility_name, payer_name, assessment_summary, coordinator_name); Jinja2 sandbox mode or equivalent safe renderer; no user-supplied template expressions evaluated
      - PATCH /api/v1/outreach-actions/{action_id} edits draft content; placement_coordinator or admin only
      - POST /api/v1/outreach-actions/{action_id}/submit-for-approval advances to pending_approval; case advances to outreach_pending_approval via transition allowlist if not already there
      - POST /api/v1/outreach-actions/{action_id}/approve sets approved_by_user_id, approval_status=approved; only placement_coordinator or admin; case advances to outreach_in_progress when FIRST outreach_action for the case is approved (transition via shared allowlist handler)
      - POST /api/v1/outreach-actions/{action_id}/mark-sent stubs email delivery (marks sent; email content NOT logged in plaintext); sets sent_by_user_id, sent_at, approval_status=sent; case advances to pending_facility_response when first outreach_action is marked sent
      - POST /api/v1/outreach-actions/{action_id}/cancel sets approval_status=canceled; permitted from draft, pending_approval, approved, or failed states (sent records are permanent communication records and cannot be canceled)
      - phone_manual and task channels: created directly at approval_status=sent (no approval flow); coordinator logs outcome; system fires sequential auto-advances through any intermediate outreach states to land case at pending_facility_response (equivalent to approve+send in a single step; bypasses pending_approval and approved states atomically)
      - GET /api/v1/cases/{case_id}/outreach-actions returns all outreach actions for case with full status
      - GET /api/v1/queues/outreach returns cross-case outreach queue filterable by approval_status
      - GET /api/v1/templates/outreach lists templates (read only; template CRUD is owned by admin-surfaces)
      - All outreach state changes write case_activity_events and AuditEvent rows
