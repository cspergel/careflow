project:
  name: PlacementOps
  description: "A post-acute placement operating system: hospital census intake → structured clinical review → weighted facility matching → staff-approved outreach → outcome tracking. Replaces spreadsheets and manual phone trees for offshore intake staff, clinical reviewers, placement coordinators, and managers."
  complexity_tier: LARGE
  tech_stack:
    runtime: python+node
    language: python+typescript
    database: supabase
    orm: sqlalchemy
    api_framework: fastapi
    auth: supabase-auth
    test_framework: pytest+jest
    frontend: next.js
    ui_library: shadcn/ui+tailwind
    background_jobs: fastapi-backgroundtasks
    deployment: docker
    test_command: ""
    dev_port: null
    mock_mode: false
  created_at: "2026-04-10T00:00:00Z"
  revision_count: 1
shared_models:
  PatientCase:
    description: Central case record tracking a patient through the 14-state placement workflow. Single source of truth for all operational activity.
    fields:
      id: uuid — PK
      organization_id: uuid → organizations.id
      hospital_id: uuid → hospital_reference.id
      patient_name: string — NOT NULL
      dob: date — nullable
      mrn: string — nullable
      hospital_unit: string — nullable
      room_number: string — nullable
      admission_date: date — nullable
      primary_diagnosis_text: string — nullable
      insurance_primary: string — nullable
      insurance_secondary: string — nullable
      patient_zip: string — nullable
      preferred_geography_text: string — nullable
      discharge_target_date: date — nullable
      current_status: "string — enum: new | intake_in_progress | intake_complete | needs_clinical_review | under_clinical_review | ready_for_matching | facility_options_generated | outreach_pending_approval | outreach_in_progress | pending_facility_response | accepted | declined_retry_needed | placed | closed"
      priority_level: "string — enum: routine | urgent | emergent | nullable"
      intake_complete: boolean — default false
      active_case_flag: boolean — default true
      assigned_coordinator_user_id: uuid → users.id — nullable (denormalized for queue performance)
      created_by_user_id: uuid → users.id — nullable
      updated_by_user_id: uuid → users.id — nullable
      created_at: timestamp — NOT NULL
      updated_at: timestamp — NOT NULL
  Facility:
    description: A post-acute care facility with capability matrix, insurance rules, contacts, and preference rankings. Core intelligence for matching.
    fields:
      id: uuid — PK
      organization_id: uuid → organizations.id
      facility_name: string — NOT NULL
      facility_type: "string — enum: snf | irf | ltach"
      address_line_1: string — nullable
      city: string — nullable
      county: string — nullable
      state: string — nullable
      zip: string — nullable
      latitude: numeric — nullable
      longitude: numeric — nullable
      active_status: boolean — default true
      notes: string — nullable
      created_at: timestamp
      updated_at: timestamp
  FacilityCapabilities:
    description: Clinical capability matrix for a facility. One row per facility. Boolean flags drive hard-exclusion logic in the matching engine. Field names must exactly match corresponding ClinicalAssessment fields for the matching engine to function correctly.
    fields:
      id: uuid — PK
      facility_id: uuid → facilities.id — UNIQUE
      accepts_snf: boolean — default false
      accepts_irf: boolean — default false
      accepts_ltach: boolean — default false
      accepts_trach: boolean — default false
      accepts_vent: boolean — default false
      accepts_hd: boolean — default false (hemodialysis)
      in_house_hemodialysis: boolean — default false
      accepts_peritoneal_dialysis: boolean — default false
      accepts_wound_vac: boolean — default false (matches wound_vac_needs on ClinicalAssessment)
      accepts_iv_antibiotics: boolean — default false
      accepts_tpn: boolean — default false
      accepts_bariatric: boolean — default false
      accepts_behavioral_complexity: boolean — default false
      accepts_memory_care: boolean — default false (matches memory_care_needed on ClinicalAssessment)
      accepts_isolation_cases: boolean — default false
      accepts_oxygen_therapy: boolean — default false (matches oxygen_required on ClinicalAssessment)
      weekend_admissions: boolean — default false
      after_hours_admissions: boolean — default false
      last_verified_at: timestamp — nullable
      updated_at: timestamp
  FacilityInsuranceRule:
    description: Payer acceptance rule for a facility. One row per payer per facility. accepted_status drives payer hard-exclusion in the matching engine.
    fields:
      id: uuid — PK
      facility_id: uuid → facilities.id
      payer_id: uuid → payer_reference.id
      payer_name: string — NOT NULL (denormalized for display)
      accepted_status: "string — enum: accepted | conditional | not_accepted"
      notes: string — nullable
      last_verified_at: timestamp — nullable
      created_at: timestamp
      updated_at: timestamp
  FacilityContact:
    description: Contact person at a facility. Includes Phase 2 voice fields for call scheduling. Used by outreach-module to address communications.
    fields:
      id: uuid — PK
      facility_id: uuid → facilities.id
      contact_name: string — NOT NULL
      title: string — nullable
      phone: string — nullable
      phone_extension: string — nullable (Phase 2 voice field)
      best_call_window: string — nullable (Phase 2 voice field, e.g. 9am-11am EST)
      phone_contact_name: string — nullable (Phase 2 voice field)
      email: string — nullable
      is_primary: boolean — default false
      created_at: timestamp
      updated_at: timestamp
  User:
    description: Authenticated platform user with a single active role scoped to an organization. role_key is denormalized on user profile for Phase 1 simplicity (single active role per user). A user_roles lookup table is seeded for forward-compatibility. Roles drive all permission checks and default landing screens.
    fields:
      id: uuid — PK
      organization_id: uuid → organizations.id
      email: string — UNIQUE NOT NULL
      full_name: string — NOT NULL
      role_key: "string — enum: admin | intake_staff | clinical_reviewer | placement_coordinator | manager | read_only (denormalized active role)"
      status: "string — enum: active | inactive"
      timezone: string — nullable
      default_hospital_id: uuid → hospital_reference.id — nullable
      created_at: timestamp
      updated_at: timestamp
  OutreachAction:
    description: "A single outreach communication to a facility for a case. Follows a 6-state approval machine: draft → pending_approval → approved → sent. Alternatively: draft → canceled (any time before sent), or sent → failed (delivery failure). failed state recovery: coordinator transitions failed → canceled; no auto-retry in Phase 1. phone_manual and task channels skip the approval states and are created directly at sent. Email delivery is stubbed in Phase 1 (marked sent, no real delivery; content NOT logged in plaintext for privacy)."
    fields:
      id: uuid — PK
      patient_case_id: uuid → patient_cases.id
      facility_id: uuid → facilities.id — nullable
      template_id: uuid → outreach_templates.id — nullable
      action_type: "string — enum: facility_outreach | internal_alert | cm_update | follow_up_reminder"
      channel: "string — enum: email | phone_manual | task | sms | voicemail_drop | voice_ai"
      draft_subject: string — nullable
      draft_body: string — NOT NULL
      approval_status: "string — enum: draft | pending_approval | approved | sent | canceled | failed"
      approved_by_user_id: uuid → users.id — nullable
      approved_at: timestamp — nullable
      sent_by_user_id: uuid → users.id — nullable
      sent_at: timestamp — nullable
      delivery_status: string — nullable
      call_transcript_url: string — nullable (Phase 2 voice field)
      call_duration_seconds: integer — nullable (Phase 2 voice field)
      call_outcome_summary: string — nullable (Phase 2 voice field)
      created_at: timestamp
      updated_at: timestamp
  OutreachTemplate:
    description: Reusable outreach message template managed by admins, used by coordinators when drafting outreach actions. Variable substitution uses a safe allowlisted set only (no user-supplied template logic evaluated).
    fields:
      id: uuid — PK
      organization_id: uuid → organizations.id
      template_name: string — NOT NULL
      template_type: "string — enum: email | phone_manual | task | voice_ai_script (Phase 2)"
      subject_template: string — nullable
      body_template: string — NOT NULL
      allowed_variables: jsonb — list of permitted variable names for substitution
      is_active: boolean — default true
      created_by_user_id: uuid → users.id
      created_at: timestamp
      updated_at: timestamp
  ClinicalAssessment:
    description: Structured clinical review for a patient case. 20+ clinical fields feed directly into the matching engine's hard-exclusion logic. Field names must exactly match corresponding FacilityCapabilities fields for the matching engine to function. Multiple assessment versions kept; latest finalized one feeds matching.
    fields:
      id: uuid — PK
      patient_case_id: uuid → patient_cases.id
      reviewer_user_id: uuid → users.id
      recommended_level_of_care: "string — enum: snf | irf | ltach"
      confidence_level: string — nullable
      clinical_summary: string — nullable
      rehab_tolerance: string — nullable
      mobility_status: string — nullable
      accepts_oxygen_therapy: boolean — default false
      accepts_trach: boolean — default false
      accepts_vent: boolean — default false
      accepts_hd: boolean — default false
      in_house_hemodialysis: boolean — default false
      accepts_peritoneal_dialysis: boolean — default false
      accepts_wound_vac: boolean — default false
      accepts_iv_antibiotics: boolean — default false
      accepts_tpn: boolean — default false
      accepts_isolation_cases: boolean — default false (was isolation_precautions; was string — changed to boolean for hard-exclusion compatibility)
      psych_behavior_flags: string — nullable (narrative notes; not used for hard exclusion)
      accepts_behavioral_complexity: boolean — default false
      accepts_bariatric: boolean — default false
      accepts_memory_care: boolean — default false
      special_equipment_needs: string — nullable
      barriers_to_placement: string — nullable
      payer_notes: string — nullable
      family_preference_notes: string — nullable
      review_status: "string — enum: draft | finalized"
      created_at: timestamp
      updated_at: timestamp
  FacilityMatch:
    description: A scored match record linking a patient case to a candidate facility. Hard exclusions produce a blocked record with blockers_json explaining why. Accepted candidates carry human-readable explanation_text. selected_for_outreach flag set when coordinator selects a facility for outreach from the Facility Matches tab.
    fields:
      id: uuid — PK
      patient_case_id: uuid → patient_cases.id
      facility_id: uuid → facilities.id
      assessment_id: uuid → clinical_assessments.id — nullable
      overall_score: numeric — NOT NULL
      payer_fit_score: numeric — nullable
      clinical_fit_score: numeric — nullable
      geography_score: numeric — nullable (0.0 when patient_zip or facility coordinates null)
      preference_score: numeric — nullable
      rank_order: integer — NOT NULL
      is_recommended: boolean — default false
      selected_for_outreach: boolean — default false (coordinator marks one or more facilities; multiple simultaneous selections allowed for parallel multi-facility outreach)
      level_of_care_fit_score: numeric — nullable (20% weight component; stored separately for per-dimension auditability)
      blockers_json: jsonb — nullable (hard exclusions)
      explanation_text: string — nullable (human-readable fit summary)
      generated_by: "string — enum: rules_engine | voice_ai (Phase 2) — default rules_engine"
      generated_at: timestamp
  ImportJob:
    description: Tracks a spreadsheet import session from file upload through column mapping, validation, and background commit. Visible to admin for monitoring. Owned by intake-module; read by admin-surfaces.
    fields:
      id: uuid — PK
      organization_id: uuid → organizations.id
      created_by_user_id: uuid → users.id
      file_name: string — NOT NULL
      file_size_bytes: integer — NOT NULL
      status: "string — enum: uploaded | mapping | validating | ready | committing | complete | failed"
      column_mapping_json: jsonb — nullable
      total_rows: integer — nullable
      created_count: integer — default 0
      updated_count: integer — default 0
      failed_count: integer — default 0
      error_detail_json: jsonb — nullable (per-row errors)
      created_at: timestamp
      updated_at: timestamp
  PlacementOutcome:
    description: Outcome record for a patient case. Tracks the sequence of accepted, declined, and placed outcomes. Feeds analytics for placement rates and decline reason breakdowns.
    fields:
      id: uuid — PK
      patient_case_id: uuid → patient_cases.id
      facility_id: uuid → facilities.id — nullable
      outcome_type: "string — enum: pending_review | accepted | declined | placed | family_declined | withdrawn"
      decline_reason_code: string → decline_reason_reference.code — nullable
      decline_reason_text: string — nullable
      recorded_by_user_id: uuid → users.id
      created_at: timestamp
  AuditEvent:
    description: Immutable append-only audit log for all state changes and sensitive actions. Required for HIPAA compliance. Never updated or deleted. Immutability enforced at both application layer (ORM insert-only) and database layer (Postgres trigger blocking UPDATE/DELETE).
    fields:
      id: uuid — PK
      organization_id: uuid → organizations.id
      entity_type: string — e.g. patient_case | outreach_action | user
      entity_id: uuid
      event_type: string — e.g. status_changed | assessment_finalized | outreach_approved
      old_value_json: jsonb — nullable
      new_value_json: jsonb — nullable
      actor_user_id: uuid → users.id — nullable (null = system action)
      created_at: timestamp — NOT NULL
validation:
  no_circular_dependencies: true
  no_orphan_nodes: true
  no_file_scope_overlaps: true
state_machine_transitions:
  new:
    intake_in_progress:
      - system
      - intake_staff
      - admin
  intake_in_progress:
    intake_complete:
      - intake_staff
      - admin
    closed:
      - manager
      - admin
  intake_complete:
    needs_clinical_review:
      - system
      - intake_staff
      - admin
    closed:
      - manager
      - admin
  needs_clinical_review:
    under_clinical_review:
      - clinical_reviewer
      - admin
    closed:
      - manager
      - admin
  under_clinical_review:
    needs_clinical_review:
      - clinical_reviewer
      - admin
    ready_for_matching:
      - clinical_reviewer
      - admin
    closed:
      - manager
      - admin
  ready_for_matching:
    facility_options_generated:
      - system
      - placement_coordinator
      - clinical_reviewer
      - admin
    closed:
      - manager
      - admin
  facility_options_generated:
    outreach_pending_approval:
      - placement_coordinator
      - admin
    ready_for_matching:
      - placement_coordinator
      - admin
    closed:
      - manager
      - admin
  outreach_pending_approval:
    outreach_in_progress:
      - system
    closed:
      - manager
      - admin
  outreach_in_progress:
    pending_facility_response:
      - system
    closed:
      - manager
      - admin
  pending_facility_response:
    accepted:
      - placement_coordinator
      - admin
    declined_retry_needed:
      - system
      - placement_coordinator
      - admin
    closed:
      - manager
      - admin
  accepted:
    placed:
      - placement_coordinator
      - admin
    declined_retry_needed:
      - placement_coordinator
      - admin
    closed:
      - manager
      - admin
  declined_retry_needed:
    ready_for_matching:
      - placement_coordinator
      - admin
    outreach_pending_approval:
      - placement_coordinator
      - admin
    closed:
      - manager
      - admin
  placed:
    closed:
      - manager
      - admin
