    spec: .forgeplan/specs/core-infrastructure.md
    description: "Shared foundation: SQLAlchemy base models for all 20+ tables, Supabase JWT auth middleware, organization_id tenant isolation middleware (defense-in-depth with Supabase RLS), audit logging hooks, case activity event bus, state machine transition allowlist enforcement, and Alembic migrations."
    acceptance_criteria:
      - Alembic migrations create all 20+ tables with correct columns, types, indexes, and FK constraints
      - Database connection pool initializes and GET /api/v1/health returns 200
      - Supabase JWT Bearer token middleware validates tokens; attaches user.id, organization_id, role_key to request.state; expired or missing tokens return 401
      - Requests for another org's data return 403; no cross-org data leakage at any endpoint
      - Supabase Row Level Security (RLS) policies enforce organization_id on all PHI tables (defense-in-depth with application middleware)
      - State machine transition allowlist enforced in shared status-transition handler; any transition not in the allowlist returns 400 with allowed transitions list; role checked against permitted_roles for the transition
      - AuditEvent table has Postgres trigger blocking UPDATE and DELETE operations; attempts return DB error; ORM layer additionally uses insert-only pattern
      - AuditEvent row written for every patient_case status change, outreach_action approval, and user management action
      - case_activity_events published for all case state transitions with actor_user_id, event_type, old_status, new_status, and occurred_at
      - Seed data: 6 roles (admin, intake_staff, clinical_reviewer, placement_coordinator, manager, read_only), decline_reason_reference codes, payer_reference entries, hospital_reference entries
      - All FK constraints enforced; cascade deletes configured per schema rules
      - All POST/PATCH endpoints that write to a PatientCase or its child entities (assessments, outreach_actions, outcomes) must return 409 when the case current_status=closed; checked in shared middleware before handler executes
      - pytest suite covers auth middleware (valid/expired/missing JWT), tenant isolation cross-org, transition allowlist (permitted and blocked transitions), AuditEvent immutability, and closed-case mutation rejection
  auth-module:
    name: Auth Module
    type: service
    status: pending
    file_scope: placementops/modules/auth/**
    depends_on:
      - core-infrastructure
    connects_to:
      - core-infrastructure
      - intake-module
      - clinical-module
      - facilities-module
      - matching-module
      - outreach-module
      - outcomes-module
      - analytics-module
      - admin-surfaces
    files:
      - placementops/modules/auth/__init__.py
      - placementops/modules/auth/schemas.py
      - placementops/modules/auth/rate_limiter.py
      - placementops/modules/auth/service.py
      - placementops/modules/auth/dependencies.py
      - placementops/modules/auth/router.py
      - placementops/modules/auth/tests/__init__.py
      - placementops/modules/auth/tests/conftest.py
      - placementops/modules/auth/tests/test_login.py
      - placementops/modules/auth/tests/test_rate_limit.py
      - placementops/modules/auth/tests/test_me.py
      - placementops/modules/auth/tests/test_logout.py
      - placementops/modules/auth/tests/test_rbac.py
      - placementops/modules/auth/tests/helpers.py
      - placementops/modules/auth/middleware.py
    spec: .forgeplan/specs/auth-module.md
    description: Supabase Auth integration for login/logout/session. Role-based permission matrix enforcement across all 6 roles. Organization-scoped user management. read_only role defined (view-only access to all data, no writes anywhere).
    acceptance_criteria:
      - POST /api/v1/auth/login authenticates via Supabase Auth and returns JWT session; login endpoint rate-limited to 10 attempts per minute per IP; lockout returns 429
      - GET /api/v1/auth/me returns authenticated user with organization_id and role_key
      - POST /api/v1/auth/logout invalidates session
