    spec: .forgeplan/specs/outcomes-module.md
    description: Placement outcome recording. Accepted outcomes advance case to accepted. Declined outcomes require a reason code and explicitly advance case to declined_retry_needed. Coordinator manually routes retry via transition allowlist back to ready_for_matching or outreach_pending_approval. Final placement confirms facility and advances to placed. Case closure by manager.
    acceptance_criteria:
      - POST /api/v1/cases/{case_id}/outcomes records PlacementOutcome; placement_coordinator or admin only; returns 403 for all other roles; outcome_type enum: pending_review | accepted | declined | placed | family_declined | withdrawn
      - Accepted outcome advances case to accepted via transition allowlist; records accepted facility_id in PlacementOutcome; facility_id must reference a facility with at least one OutreachAction.approval_status=sent for the same patient_case_id; returns 400 if no sent outreach exists for that facility
      - Declined outcome requires decline_reason_code from decline_reason_reference seed data (seed data includes rescission codes: bed_no_longer_available, insurance_issue_post_acceptance, clinical_criteria_not_met, no_response); decline_reason_text optional; facility_id required for declined outcomes (must reference a facility with sent outreach for this case; returns 400 if facility has no sent outreach); advances case to declined_retry_needed; family_declined and withdrawn outcomes permit null facility_id
      - Coordinator retry routing: POST /api/v1/cases/{case_id}/status-transition from declined_retry_needed to ready_for_matching or outreach_pending_approval; permitted for placement_coordinator and admin; requires transition_reason text; enforced by shared transition allowlist handler
      - POST /api/v1/cases/{case_id}/outcomes with outcome_type=placed records final facility; advances case to placed via transition allowlist
      - POST /api/v1/cases/{case_id}/status-transition to closed requires closure_reason; only manager or admin
      - GET /api/v1/cases/{case_id}/timeline returns chronological case_activity_events feed
      - GET /api/v1/cases/{case_id}/outcomes returns all PlacementOutcome history for case
      - All outcomes write PlacementOutcome table, case_activity_events, and AuditEvent rows (all outcome types audited for HIPAA compliance, not just declines)
      - family_declined and withdrawn outcome_types advance case to closed (manager or admin must confirm); coordinator records the outcome then closure follows
      - When case advances to accepted or placed, all OutreachAction records in draft/pending_approval/approved states for that case are auto-transitioned to canceled; sent actions remain as permanent communication records
