      - ../../../../../c/Users/drcra/Documents/Coding Projects/Placement-ops-careflow/placementops/modules/matching/tests/test_scoring.py
      - ../../../../../c/Users/drcra/Documents/Coding Projects/Placement-ops-careflow/placementops/modules/matching/tests/test_select.py
      - ../../../../../c/Users/drcra/Documents/Coding Projects/Placement-ops-careflow/.forgeplan/conversations/nodes/matching-module.md
      - ../../../../../c/Users/drcra/Documents/Coding Projects/Placement-ops-careflow/.forgeplan/state.json
      - placementops/modules/matching/engine.py
      - placementops/modules/matching/tests/test_scoring.py
      - placementops/modules/matching/tests/test_generate.py
    spec: .forgeplan/specs/matching-module.md
    description: "Weighted rules engine scoring all active facilities against a patient's latest finalized clinical assessment. Hard exclusions eliminate facilities before scoring. Numeric scoring weights: payer_fit 35%, clinical_fit 30%, level_of_care 20%, geography 10%, preference 5%. Produces ranked FacilityMatch records with component scores, blockers_json, and explanation_text. Coordinator selects facilities for outreach from results."
    acceptance_criteria:
      - POST /api/v1/cases/{case_id}/matches/generate runs scoring engine; requires finalized ClinicalAssessment; stores FacilityMatch records; advances case to facility_options_generated via transition allowlist
      - Hard exclusions stored in blockers_json — payer not accepted per FacilityInsuranceRule; required capability missing per FacilityCapabilities using exact field mappings: trach→accepts_trach, vent→accepts_vent, dialysis_type=hd→accepts_hd+in_house_hemodialysis, dialysis_type=peritoneal→accepts_peritoneal_dialysis, wound_vac_needs→accepts_wound_vac, oxygen_required→accepts_oxygen_therapy, memory_care_needed→accepts_memory_care, bariatric_needs→accepts_bariatric, iv_antibiotics→accepts_iv_antibiotics, tpn→accepts_tpn, isolation_precautions=true→accepts_isolation_cases, behavioral_complexity_flag→accepts_behavioral_complexity; facility_type not matching recommended_level_of_care
      - Scoring weights applied to non-excluded facilities: payer_fit_score (35%), clinical_fit_score (30%), level_of_care_fit (20%), geography_score (10%), preference_score (5%); overall_score = weighted sum normalized to 0–100
      - geography_score: computed from patient_zip to facility coordinates (haversine); if patient_zip is null OR facility lat/lng null → geography_score = 0.0 (not an exclusion); higher score = shorter distance
      - preference_score: bonus applied for facilities in facility_preferences for case's hospital or org scope
      - explanation_text is human-readable per facility (e.g. "Accepts Medicare, supports wound vac and trach, 4.2 miles, preferred facility")
      - is_recommended flag set on top 3 highest-scored non-blocked facilities
      - rank_order assigned; blocked facilities included at bottom with rank_order -1 and explanation of blocker
      - GET /api/v1/cases/{case_id}/matches returns latest match set with full scoring breakdown
      - PATCH /api/v1/cases/{case_id}/matches/{match_id}/select toggles selected_for_outreach on FacilityMatch; multiple facilities may be selected simultaneously for parallel outreach; PATCH again to deselect; writes case_activity_events
      - Re-scoring supported (POST again after assessment update); old matches preserved; new set created with generated_at timestamp; selected_for_outreach state is NOT carried forward — coordinator must re-select from new results; frontend shows warning "Re-generating matches will clear your current selections" before proceeding
      - Only clinical_reviewer, placement_coordinator, or admin can trigger match generation or select facilities
