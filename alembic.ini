# Alembic configuration for PlacementOps
# Uses DATABASE_DIRECT_URL (port 5432) for migrations — NOT the app pool URL

[alembic]
# script_location is relative to the location of this ini file
script_location = alembic

# sqlalchemy.url is NOT set here — it is set dynamically in env.py
# from DATABASE_DIRECT_URL environment variable
# sqlalchemy.url = (set in env.py)

# Output formatting for migration files
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40

# Timezone for migration timestamps
timezone = UTC

# Max character width of revision content in the console output
output_encoding = utf-8

[post_write_hooks]
# No post-write hooks needed

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
