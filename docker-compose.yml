version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: placementops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/placementops
      DATABASE_DIRECT_URL: postgresql+asyncpg://postgres:postgres@db:5432/placementops
      SUPABASE_JWT_SECRET: dev-secret-change-in-production
      # WARNING: Replace before deploying to production. Use a 256-bit random secret.
      # Generate: openssl rand -base64 32
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      APP_ENV: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app

volumes:
  postgres_data:
